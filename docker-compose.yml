# docker-compose.yml — ServiceNow MCP Server
#
# Usage:
#   1. Copy .env.production.template → .env.production and fill in values
#   2. docker compose up -d
#   3. curl http://localhost:8080/health          → {"status":"ok"}
#   4. curl http://localhost:8080/sse             → 401 (no token)
#   5. curl -H "Authorization: Bearer <TOKEN>" http://localhost:8080/sse → SSE stream

services:
  servicenow-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: servicenow-mcp
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      # Expose to host so Cloudflare / reverse proxy can reach it
      - "8080:8080"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"
